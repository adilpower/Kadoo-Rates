name: Auto-Update Rates
on:
  workflow_dispatch:
  schedule:
    - cron: "5 6 * * *"

permissions:
  contents: write
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright beautifulsoup4
          playwright install --with-deps chromium

      - name: Run Scraper
        run: python scrape.py

      - name: Upload debug info (only useful if something looks wrong)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-options
          path: debug_options.json
          retention-days: 5

      - name: Deploy
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.html
          git commit -m "Auto-update rates $(date -u +'%Y-%m-%d %H:%M UTC')" || echo "No changes to commit"
          git push

      - name: Auto-retry GitHub Pages deployment if it fails
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for GitHub's Pages deployment workflow to start..."
          sleep 20

          MAX_ATTEMPTS=5
          attempt=1

          while [ $attempt -le $MAX_ATTEMPTS ]; do
            echo "Attempt $attempt: checking latest pages-build-deployment run..."

            RUN_JSON=$(gh run list --workflow="pages-build-deployment" --limit 1 --json databaseId,status,conclusion)
            RUN_ID=$(echo "$RUN_JSON" | jq -r '.[0].databaseId // empty')
            STATUS=$(echo "$RUN_JSON" | jq -r '.[0].status // empty')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.[0].conclusion // empty')

            if [ -z "$RUN_ID" ]; then
              echo "No pages-build-deployment run found yet, waiting..."
              sleep 15
              attempt=$((attempt + 1))
              continue
            fi

            echo "Run ID: $RUN_ID | Status: $STATUS | Conclusion: $CONCLUSION"

            if [ "$STATUS" != "completed" ]; then
              echo "Still running, waiting..."
              sleep 15
              continue
            fi

            if [ "$CONCLUSION" == "success" ]; then
              echo "Pages deployment succeeded. Done."
              exit 0
            fi

            echo "Pages deployment failed (conclusion: $CONCLUSION). Re-running it..."
            gh run rerun "$RUN_ID"
            sleep 20
            attempt=$((attempt + 1))
          done

          echo "Gave up after $MAX_ATTEMPTS attempts. Check the Actions tab manually."
          exit 0
